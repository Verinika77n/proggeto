{% extends 'base.html' %}

{% block content %}

<h1 class="page-title">Вход</h1>



<form method="post" class="form-group">
  {% csrf_token %}

  <div class="form-group">
    <label>Логин</label>
    {{ form.username }}
  </div>

  <div class="form-group">
    <label>Пароль</label>
    {{ form.password }}
  </div>
  {% if form.errors %}
  
  <div class="error-message" style="margin-bottom: 20px;">
    Неверный логин или пароль
  </div>
{% endif %}

  <button type="submit" class="primary-btn" >
    Войти
  </button>

</form>

<div style="margin-top: 20px;">
  <p>
    Нет аккаунта?
    <a class="vhod-v-sistemy" href="{% url 'signup' %}">Зарегистрируйтесь</a>
  </p>
</div>

{% endblock %}
